# ── Key bindings ───────────────────────────────────────────────
# screen-like prefix on backtick
set -g prefix `
bind ` send-prefix          # press `` to insert a literal backtick

# reload config
unbind r
bind r source-file ~/.tmux.conf \; display "tmux.conf reloaded"

# quick pane cycling (prefix + Ctrl-b)
unbind C-b
bind C-b select-pane -t :.+

# ── General behaviour ──────────────────────────────────────────
set -g mouse on
set -g history-limit 100000
set -sg escape-time 10          # no lag after Esc (helps vim)
set -g base-index 1             # windows start at 1
setw -g pane-base-index 1
set -g renumber-windows on      # close a window -> the rest renumber
set -g focus-events on

# colours / truecolor
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc,xterm*:Tc"

# ── Status bar ─────────────────────────────────────────────────
set -g status-style "fg=white,bg=black"

# left
set -g status-left-length 20
set -g status-left-style "fg=blue,bright"
set -g status-left ':: #h :: '

# windows: "<pwd basename> | <window title>"
setw -g automatic-rename on
set -g window-status-format         ' #{b:pane_current_path} | #W '
set -g window-status-current-format ' #{b:pane_current_path} | #W '
setw -g window-status-current-style "fg=green,bright"

# right
set -g status-right-length 60
set -g status-right-style "fg=yellow,bright"
set -g status-right '[ #(uptime|cut -d"," -f4-|sed -e "s!load average:!!" -e "s/   //") ]#[fg=cyan][ %D - %H:%M ]'
