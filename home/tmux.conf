# ── Key bindings ───────────────────────────────────────────────
# screen-like prefix on backtick
set -g prefix `
bind ` send-prefix          # press `` to insert a literal backtick

# reload config
unbind r
bind r source-file ~/.tmux.conf \; display "tmux.conf reloaded"

# quick pane cycling (prefix + Ctrl-b)
unbind C-b
bind C-b select-pane -t :.+

# ── General behaviour ──────────────────────────────────────────
set -g mouse off               # terminal handles selection + middle-click paste natively
set -g history-limit 100000
set -sg escape-time 10          # no lag after Esc (helps vim)
set -g base-index 1             # windows start at 1
setw -g pane-base-index 1
set -g renumber-windows on      # close a window -> the rest renumber
set -g focus-events on
set -g set-clipboard on         # copy to the system clipboard via OSC52 (works over ssh/mosh)

# colours / truecolor
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc,xterm*:Tc"

# ── Copy mode ──────────────────────────────────────────────────
# vi keys in copy mode; use `prefix + [` then j/k/PageUp/search to scroll back
setw -g mode-keys vi
bind -T copy-mode-vi Escape send -X cancel   # Esc exits (vi default only clears the selection)

# ── Status bar ─────────────────────────────────────────────────
set -g status-style "fg=white,bg=black"

# left
set -g status-left-length 20
set -g status-left-style "fg=blue,bright"
set -g status-left ':: #h :: '

# windows: "<pwd basename> | <window title>"
# claude panes report their summary as the pane title (#T), not the window
# name; for those use #T, otherwise fall back to the foreground command.
setw -g automatic-rename on
setw -g automatic-rename-format '#{?#{==:#{pane_current_command},claude},#{pane_title},#{pane_current_command}}'
set -g window-status-format         ' #{b:pane_current_path} | #W '
set -g window-status-current-format ' #{b:pane_current_path} | #W '
setw -g window-status-current-style "fg=green,bright"

# right: empty
set -g status-right ''

# ── Plugins (tpm) ──────────────────────────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'   # save/restore sessions (prefix + Ctrl-s / Ctrl-r)
set -g @plugin 'tmux-plugins/tmux-continuum'   # auto-save every 15m + restore on server start
set -g @continuum-restore 'on'

# bootstrap tpm on first launch, then install plugins headlessly
if "test ! -d ~/.tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm && ~/.tmux/plugins/tpm/bin/install_plugins'"

run '~/.tmux/plugins/tpm/tpm'   # keep this line last
